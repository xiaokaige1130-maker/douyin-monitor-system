version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: douyin_monitor
      POSTGRES_USER: douyin
      POSTGRES_PASSWORD: douyin123
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U douyin"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  influxdb:
    image: influxdb:2.7-alpine
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: admin123
      DOCKER_INFLUXDB_INIT_ORG: douyin
      DOCKER_INFLUXDB_INIT_BUCKET: douyin_data
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: douyin-token-123
    volumes:
      - influxdb_data:/var/lib/influxdb2
    ports:
      - "8086:8086"
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:10.4.2
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_INSTALL_PLUGINS: grafana-clock-panel,grafana-simple-json-datasource
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "3000:3000"
    depends_on:
      influxdb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  monitor:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      influxdb:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://douyin:douyin123@postgres:5432/douyin_monitor
      - REDIS_URL=redis://redis:6379/0
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=douyin-token-123
      - INFLUXDB_ORG=douyin
      - INFLUXDB_BUCKET=douyin_data
      - CHECK_INTERVAL_NORMAL=${CHECK_INTERVAL_NORMAL:-10}
      - CHECK_INTERVAL_LIVE=${CHECK_INTERVAL_LIVE:-2}
      - MAX_CONCURRENT_CHECKS=${MAX_CONCURRENT_CHECKS:-3}
      - MIN_REQUEST_DELAY_SECONDS=${MIN_REQUEST_DELAY_SECONDS:-2}
      - MAX_REQUEST_DELAY_SECONDS=${MAX_REQUEST_DELAY_SECONDS:-8}
      - ACCOUNT_COOLDOWN_MINUTES=${ACCOUNT_COOLDOWN_MINUTES:-30}
      - RISK_COOLDOWN_MINUTES=${RISK_COOLDOWN_MINUTES:-180}
      - DOUYIN_COOKIE=${DOUYIN_COOKIE:-}
      - PROXY_ENABLED=${PROXY_ENABLED:-false}
      - PROXY_URL=${PROXY_URL:-}
    volumes:
      - ./config:/app/config
      - ./logs:/app/logs
      - ./data:/app/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  influxdb_data:
  grafana_data: